version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: notifyflow-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: notifyflow
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: notifyflow-backend
    restart: always
    ports:
      - '5000:5000'
    environment:
      PORT: 5000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/notifyflow?schema=public
      JWT_SECRET: super_secret_jwt_key_notifyflow_2026
      USE_LOCAL_MOCKS: 'true'
    depends_on:
      - postgres

volumes:
  postgres_data:
